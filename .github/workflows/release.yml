name: Release

# Publish to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for PyPI Trusted Publishing

jobs:
  # Reject tags that aren't on main, so we never publish from a feature branch.
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag commit is on main
        run: |
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag '${{ github.ref_name }}' is not on main. Tags must come from main."
            exit 1
          fi
          echo "Tag is on main."

  test:
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG != pyproject version $PKG"; exit 1
          fi
      - name: Build distributions
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi    # configure this environment in repo settings for protection
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
